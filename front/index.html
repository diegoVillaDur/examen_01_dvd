<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión de Salones</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container mt-5 p-4 bg-white rounded shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Gestión de Salones</h2>
                <button class="btn btn-success" onclick="agregarSalon()">
                    + Agregar Salón
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Capacidad</th>
                            <th>Edificio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                    </tbody>
                </table>
            </div>
        </div>

        <script>
        // Simulamos los datos iniciales que vendrían de tu API
        let salones = [
            { id: 1, nombre: "A-101", capacidad: 30, edificio: "Edificio Norte" },
            { id: 2, nombre: "B-205", capacidad: 45, edificio: "Edificio Sur" },
            { id: 3, nombre: "Lab Computo", capacidad: 20, edificio: "Tecnología" }
        ];

        // 1. RENDERIZAR LA TABLA (Equivale al GET)
        function renderizarTabla() {
            const tbody = document.getElementById('tabla-cuerpo');
            tbody.innerHTML = ''; // Limpiar contenido previo

            if (salones.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No hay salones registrados.</td></tr>';
                return;
            }

            salones.forEach(salon => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${salon.id}</td>
                    <td>${salon.nombre}</td>
                    <td>${salon.capacidad}</td>
                    <td>${salon.edificio}</td>
                    <td>
                        <button class="btn btn-primary btn-sm me-2" onclick="editarSalon(${salon.id})">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminarSalon(${salon.id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(fila);
            });
        }

        // 2. AGREGAR SALÓN (Equivale al POST)
        function agregarSalon() {
            // Nota: Pedir 3 datos seguidos por prompt no es la mejor experiencia de usuario, 
            // pero lo mantenemos así de momento para que veas la lógica simple.
            const nombre = prompt('Ingresa el nombre del nuevo salón:');
            if (!nombre) return; // Cancelar si no ingresa nada

            const capacidadStr = prompt('Ingresa la capacidad (número de personas):');
            const capacidad = parseInt(capacidadStr);
            if (isNaN(capacidad)) {
                alert("La capacidad debe ser un número válido.");
                return;
            }

            const edificio = prompt('Ingresa el edificio al que pertenece:');
            if (!edificio) return;

            // Generar un nuevo ID simulado
            const nuevoId = salones.length > 0 ? Math.max(...salones.map(s => s.id)) + 1 : 1;
            
            salones.push({ 
                id: nuevoId, 
                nombre: nombre, 
                capacidad: capacidad, 
                edificio: edificio 
            });
            
            renderizarTabla();
        }

        // 3. EDITAR SALÓN (Equivale al PUT/PATCH)
        function editarSalon(id) {
            const salon = salones.find(s => s.id === id);
            if (salon) {
                const nuevoNombre = prompt('Editar nombre del salón:', salon.nombre);
                if (nuevoNombre === null) return; // Si el usuario presiona "Cancelar"

                const nuevaCapacidadStr = prompt('Editar capacidad:', salon.capacidad);
                if (nuevaCapacidadStr === null) return;
                const nuevaCapacidad = parseInt(nuevaCapacidadStr);

                const nuevoEdificio = prompt('Editar edificio:', salon.edificio);
                if (nuevoEdificio === null) return;

                // Validación simple de capacidad
                if (!isNaN(nuevaCapacidad)) {
                    salon.nombre = nuevoNombre;
                    salon.capacidad = nuevaCapacidad;
                    salon.edificio = nuevoEdificio;
                    renderizarTabla();
                } else {
                    alert("No se guardaron los cambios: La capacidad debe ser un número.");
                }
            }
        }

        // 4. ELIMINAR SALÓN (Equivale al DELETE)
        function eliminarSalon(id) {
            if (confirm(`¿Estás seguro de que deseas eliminar el salón con ID ${id}?`)) {
                salones = salones.filter(s => s.id !== id);
                renderizarTabla();
            }
        }

        // Cargar los datos al iniciar la página
        document.addEventListener('DOMContentLoaded', renderizarTabla);
    </script>
    </body>
</html>
